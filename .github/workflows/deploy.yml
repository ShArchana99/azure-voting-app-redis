name: Build and Deploy to AKS

# 1. THE TRIGGER: Run this when code is pushed to the main branch
on:
  push:
    branches: ["main"]

# 2. SECURITY: Allow GitHub to request the secure OIDC token from Azure
permissions:
  id-token: write
  contents: read

# 3. VARIABLES: Update these to match your Terraform names
env:
  ACR_NAME: "acrsharchana99" # <--- UPDATE THIS LINE
  RESOURCE_GROUP: "rg-azure-voting-app"
  CLUSTER_NAME: "aks-voting-app"
  IMAGE_NAME: "azure-vote-front"

# 4. THE JOBS: What the server will actually do
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # Spins up a temporary Linux server
    steps:
      
      # Step A: Download your application code onto the temporary server
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Log into Azure using the 3 Secrets we saved earlier
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Step C: Log into your specific Container Registry
      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      # Step D: Build the Docker image and push it to the registry
      - name: Build and Push Docker Image
        run: |
          docker build azure-vote -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Step E: Download the AKS cluster credentials (just like we did locally!)
      - name: Get AKS Credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      # Step F: Deploy the application to the Kubernetes cluster
      - name: Deploy to AKS
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            azure-vote-all-in-one-redis.yaml
          images: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
